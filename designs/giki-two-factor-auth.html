<!DOCTYPE html>
<html lang="en" class="ui-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Factor Auth - Giki</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../ui-kit/styles.css">
    <style>
        :root {
            --color-blue-50: #eff6ff;
            --color-blue-100: #dbeafe;
            --color-blue-200: #bfdbfe;
            --color-blue-300: #93c5fd;
            --color-blue-400: #60a5fa;
            --color-blue-500: oklch(54.6% 0.245 262.881);
            --color-blue-600: oklch(54.6% 0.245 262.881);
            --color-blue-700: #1e40af;
            --color-green-50: oklch(98.6% 0.031 120.757);
            --color-green-100: oklch(96.8% 0.059 122.328);
            --color-green-500: oklch(76.8% 0.233 130.85);
            --color-green-600: oklch(64.8% 0.2 131.684);
            --color-red-50: oklch(98.9% 0.016 17.16);
            --color-red-100: oklch(97.1% 0.034 17.16);
            --color-red-300: oklch(88.5% 0.126 18.716);
            --color-red-500: oklch(71.5% 0.213 17.621);
            --color-red-600: oklch(64.5% 0.246 16.408);
            --color-amber-50: #fffbeb;
            --color-amber-400: #fbbf24;
            --color-amber-500: #f59e0b;
            --color-gray-50: oklch(98.4% 0.003 247.858);
            --color-gray-100: oklch(96.8% 0.007 247.896);
            --color-gray-200: oklch(92.8% 0.013 255.508);
            --color-gray-300: oklch(86.9% 0.022 252.894);
            --color-gray-400: oklch(70.4% 0.04 256.788);
            --color-gray-500: oklch(55.4% 0.046 257.417);
            --color-gray-600: oklch(45.4% 0.04 256.802);
            --color-gray-700: oklch(37.2% 0.044 257.287);
            --color-gray-800: oklch(28% 0.037 260.031);
            --color-gray-900: oklch(20.8% 0.042 265.755);
            --color-purple-500: #a855f7;
            --color-purple-600: #9333ea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, .ui-body, .ui-body * {
            font-family: 'Source Sans 3', sans-serif;
        }

        /* Right side - Gradient background */
        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: white;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, oklch(54.6% 0.245 262.881) 0%, #1e40af 100%);
        }

        /* Left side */
        .left-side {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 60px;
        }

        .form-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 25px;
        }

        .scan-title {
            font-size: 21px;
            color: var(--color-gray-500);
            text-wrap-style: balance;
            margin-top: -5px;
        }

        .tooltip-trigger {
            position: relative;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
            cursor: help;
            transition: color 0.2s ease;
        }

        .tooltip-trigger:hover {
            color: var(--color-gray-900);
        }

        .tooltip-trigger::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 14px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-gray-900);
            color: white;
            font-size: 16px;
            font-weight: 400;
            font-family: 'Source Sans 3', sans-serif;
            padding: 8px 12px;
            border-radius: 8px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        /* Arrow pointing down toward the text */
        .tooltip-trigger::before {
            content: '';
            position: absolute;
            bottom: calc(100% + 2px);
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: var(--color-gray-900);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .tooltip-trigger:hover::after,
        .tooltip-trigger:hover::before {
            opacity: 1;
        }

        .qr-wrapper {
            background: var(--color-gray-100);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--color-gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* QR code SVG placeholder */
        .qr-code {
            width: 240px;
            height: 240px;
        }

        .helper-text {
            font-size: 17px;
            color: var(--color-gray-600);
            text-align: center;
            text-wrap-style: balance;
            line-height: 1.5;
        }

        .code-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
        }

        .code-label {
            font-size: 17px;
            font-weight: 600;
            color: var(--color-blue-500);
            text-align: left;
        }

        .digit-inputs {
            display: flex;
            gap: 10px;
        }

        .digit-input {
            width: 75px;
            height: 64px;
            border: 2px solid var(--color-gray-200);
            border-radius: 12px;
            background: var(--color-gray-100);
            font-size: 24px;
            font-weight: 600;
            font-family: 'Source Sans 3', sans-serif;
            color: var(--color-gray-900);
            text-align: center;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .digit-input:focus {
            border-color: var(--color-blue-500);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .digit-input.filled {
            border-color: var(--color-gray-300);
        }

        .ui-btn-primary { border-color: transparent; }
        .ui-btn-primary:hover { border-color: transparent; }
        .ui-btn-large { font-size: 19px; }

        /* Match signup button overrides */
        .ui-btn-primary { border-color: transparent; }
        .ui-btn-primary:hover { border-color: transparent; }
        .ui-btn-large { font-size: 19px; }
        .ui-form-field-large > label { font-size: 17px; }
        .ui-form-field-large input { font-size: 18px; }

        @media (max-width: 968px) {
            .right-side {
                min-height: 300px;
                padding: 40px 30px;
            }

            .left-side {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body class="ui-body">
    <div style="display: flex;">
        <!-- Left Side - 2FA Form -->
        <div class="left-side">
            <div class="form-container">

                <h2 style="font-size: 50px; font-weight: 500; color: var(--color-gray-900); text-align: left; line-height: 1.1; margin-bottom: -5px;">Two-Factor Authentication</h2>
                <p class="scan-title">Enter the 6-digit code from your authenticator app.</p>


                <div class="code-section">
                    <p class="code-label">Verification code:</p>
                    <div class="digit-inputs">
                        <input type="text" maxlength="1" class="digit-input" inputmode="numeric">
                        <input type="text" maxlength="1" class="digit-input" inputmode="numeric">
                        <input type="text" maxlength="1" class="digit-input" inputmode="numeric">
                        <input type="text" maxlength="1" class="digit-input" inputmode="numeric">
                        <input type="text" maxlength="1" class="digit-input" inputmode="numeric">
                        <input type="text" maxlength="1" class="digit-input" inputmode="numeric">
                    </div>
                </div>

                <button class="ui-btn-large ui-btn-primary" style="width: 100%;" onclick="window.location.href='giki-login.html'">Cancel and sign in again</button>

            </div>
        </div>

        <!-- Right Side - Visual (copied from giki-login) -->
        <div class="right-side">
            <img src="giki-actions-text.png" alt="Giki Actions" style="width: 36%; position: relative; z-index: 1; filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.3));">

                    </g>
                </g>
            </svg>
        </div>
    </div>
</body>
</html>
