    <style>
        :root {
            /* Blue */
            --color-blue-500: oklch(54.6% 0.245 262.881);
            --color-blue-600: oklch(54.6% 0.245 262.881);

            /* Red */
            --color-red-500: #ef4444;
            --color-red-600: #dc2626;

            /* Gray */
            --color-gray-50: #f8fafc;
            --color-gray-100: #f1f5f9;
            --color-gray-200: #e2e8f0;
            --color-gray-300: #cbd5e1;
            --color-gray-400: #94a3b8;
            --color-gray-500: #64748b;
            --color-gray-600: #475569;
            --color-gray-700: #334155;
            --color-gray-800: #1e293b;
            --color-gray-900: #0f172a;
            --color-gray-950: #020617;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            color: var(--color-gray-950);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            text-align: center;
            padding: 40px 40px 10px 40px;
            max-width: 520px;
        }

        .illustration-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 16px;
        }

        .illustration {
            width: 200px;
            height: 200px;
        }

        /* Lock glow animation */
        .lock-glow {
            animation: lockGlow 1.5s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: center center;
        }

        @keyframes lockGlow {
            0%, 100% { opacity: 0.25; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.15); }
        }

        .title {
            font-size: 31px;
            font-weight: 600;
            color: var(--color-gray-900);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 19px;
            color: var(--color-gray-600);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* ========================================
           CANONICAL BUTTON STYLES
           ======================================== */
        .ui-btn {
            --primary-color: var(--color-blue-500);
            --primary-color-dark: var(--color-blue-600);
            --primary-shadow: color-mix(in srgb, #3b82f6 30%, transparent);
            --primary-shadow-light: color-mix(in srgb, #3b82f6 20%, transparent);
            --primary-shadow-dark: color-mix(in srgb, #3b82f6 40%, transparent);

            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            border: 2px solid;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-align: center;
            text-decoration: none;
        }

        .ui-btn-default {
            padding: 11px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
        }

        .ui-btn-primary {
            border-color: var(--primary-color);
            color: white;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-color-dark) 100%);
            box-shadow: 0 2px 8px var(--primary-shadow);
        }

        .ui-btn-primary:hover {
            border-color: var(--primary-color-dark);
            box-shadow:
                0 0 0 4px var(--primary-shadow-light),
                0 4px 16px var(--primary-shadow-dark);
        }

        .ui-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .help-text {
            margin-top: 32px;
            font-size: 16px;
            color: var(--color-gray-500);
            line-height: 1.6;
            background: var(--color-gray-200);
            border: 1px solid var(--color-gray-300);
            border-radius: 12px;
            padding: 16px 20px;
        }

        .help-text strong {
            color: var(--color-gray-700);
        }

        .help-text a {
            color: var(--color-gray-800);
            text-decoration: none;
            font-weight: 500;
        }

        .help-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

        <h1 class="title">You've been Logged out</h1>
        <p class="subtitle">
